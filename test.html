<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test fotocamera</title>
<style>
body{font-family:sans-serif;padding:20px;background:#f5f5f5}
h2{margin-bottom:20px}
.btn{display:block;width:100%;padding:18px;margin-bottom:16px;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;text-align:center}
.a{background:#C4622D;color:#fff}
.b{background:#5C3317;color:#fff}
.c{background:#D4A853;color:#fff}
label.btn{display:flex;align-items:center;justify-content:center;gap:10px;position:relative;overflow:hidden}
label.btn input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer}
#log{background:#fff;border-radius:8px;padding:16px;min-height:120px;font-size:13px;font-family:monospace;white-space:pre-wrap;border:2px solid #ddd}
</style>
</head>
<body>
<h2>Test fotocamera Android</h2>

<p style="margin-bottom:16px;font-size:14px;color:#666">Premi ogni pulsante e dimmi cosa succede</p>

<!-- TEST 1: label con input dentro -->
<label class="btn a">
  <input type="file" accept="image/*" capture="environment" id="t1">
  TEST 1: Label + input dentro (camera)
</label>

<!-- TEST 2: label con input dentro, senza capture -->
<label class="btn b">
  <input type="file" accept="image/*" id="t2">
  TEST 2: Label + input (galleria)
</label>

<!-- TEST 3: input visibile -->
<div style="margin-bottom:16px">
  <p style="font-size:14px;margin-bottom:8px">TEST 3: Input file normale visibile</p>
  <input type="file" accept="image/*" capture="environment" id="t3" style="font-size:16px;width:100%">
</div>

<!-- LOG -->
<div id="log">In attesa di eventi...\n</div>

<script>
function log(msg){
  var d=document.getElementById('log');
  var ts=new Date().toLocaleTimeString();
  d.textContent=ts+' '+msg+'\n'+d.textContent;
}

function setup(id){
  var el=document.getElementById(id);
  if(!el){log('ERRORE: '+id+' non trovato');return;}
  el.addEventListener('change',function(){
    if(el.files&&el.files[0]){
      var f=el.files[0];
      log(id+' CHANGE OK: '+f.name+' ('+Math.round(f.size/1024)+'KB, '+f.type+')');
    } else {
      log(id+' CHANGE: nessun file');
    }
  });
  log(id+' listener aggiunto');
}

setup('t1');
setup('t2');
setup('t3');

log('Pagina caricata. Premi i pulsanti sopra.');
</script>
</body>
</html>
